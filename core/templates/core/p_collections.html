{% extends 'core/g_base.html' %}
{% load static %}

{% block head %}
{{ block.super }}
<title>Collections - Media Journal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
<script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
<link rel="stylesheet" href="{% static 'core/css/p_collections.css' %}">
{% endblock %}

{% block content %}
<body data-media-type="collections"></body>
<div class="separator-bar"></div>

<div class="collections-page-container">
    <div class="collections-header">
        <h1>Collections</h1>
        <div class="header-actions">
            <button id="toggle-sort-btn" class="action-btn" title="Toggle Reorder">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <button id="create-collection-btn" class="action-btn" title="Create Collection">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </div>

    <!-- The grid where collections are dynamically loaded -->
    <div id="collections-grid" class="collections-grid"></div>

    <div id="loading-indicator" style="text-align: center; padding: 20px; display: none;">
        Loading...
    </div>
    <p id="no-items-message" class="hidden-items" style="display: none;">No collections found.</p>
</div>

<!-- Embedded Create/Edit Modal -->
<div id="collection-modal-overlay" class="modal-overlay modal-hidden">
    <div class="collection-modal">
        <h2 id="modal-title">Create Collection</h2>
        <form id="collection-form">
            <input type="hidden" id="col-id">
            
            <div class="form-group">
                <label for="col-title">Title</label>
                <input type="text" id="col-title" required autocomplete="off" placeholder="e.g. Marvel Universe">
            </div>
            
            <div class="form-group">
                <label for="col-desc">Description</label>
                <textarea id="col-desc" rows="4" placeholder="Optional notes about this collection..."></textarea>
            </div>
            
            <div class="modal-actions">
                <button type="button" id="delete-col-btn" class="btn-delete" style="display: none;">Delete</button>
                <div class="right-actions">
                    <button type="button" id="close-modal-btn" class="btn-cancel">Cancel</button>
                    <button type="submit" id="save-col-btn" class="btn-save">Save</button>
                </div>
            </div>
        </form>
    </div>
</div>

{% endblock %}

{% block script %}
{{ block.super }}
<script>
  document.body.setAttribute('data-theme', '{{ theme_mode }}');
</script>
<script src="{% static 'core/js/p_collections.js' %}"></script>
{% endblock %}
