{% load static %}

<!-- Metadata Modal Partial -->
<div id="metadata-modal" class="md-modal md-modal-hidden">
  <div class="md-modal-content">
    <form id="metadata-form" enctype="multipart/form-data">
      
      <!-- Banner Upload Area -->
      <div class="md-modal-banner" id="metadata-banner-container">
        <img id="metadata-banner-preview" src="{% static 'core/img/placeholder.png' %}" alt="banner">
        <div class="md-banner-overlay"></div>
        <label class="md-upload-overlay" for="metadata-banner-input" title="Upload Banner">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </label>
        <input type="file" id="metadata-banner-input" name="banner_image" accept="image/*" style="display: none;">
      </div>

      <!-- Cover Upload Area -->
      <div class="md-modal-cover" id="metadata-cover-container">
        <img id="metadata-cover-preview" src="{% static 'core/img/placeholder.png' %}" alt="cover">
        <label class="md-upload-overlay" for="metadata-cover-input" title="Upload Cover">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </label>
        <input type="file" id="metadata-cover-input" name="cover_image" accept="image/*" style="display: none;">
      </div>

      <!-- Title Block -->
      <div class="md-modal-title-block">
        <input type="text" name="title" id="metadata-title-input" class="md-title-input md-modal-title" placeholder="Title" required autocomplete="off">
      </div>

      <!-- Modal Body -->
      <div class="md-modal-body">
        
        <div class="md-modal-actions-top">
          <button type="submit" class="md-btn md-save-btn">Save</button>
        </div>

<!-- Dynamic Flowing Fields (Automatically wraps and fills empty spaces) -->
        <div class="md-form-row-two">
          
          <!-- Creators -->
          <div class="md-form-group md-vertical-label">
            <label>Creators</label>
            <div class="md-creator-input-container" onclick="document.getElementById('metadata-creator-input').focus()">
              <div class="md-creator-tags" id="metadata-creator-tags"></div>
              <input type="text" id="metadata-creator-input" placeholder="Add creator..." autocomplete="off">
            </div>
          </div>

          <!-- Genres -->
          <div class="md-form-group md-vertical-label">
            <label>Genres</label>
            <div class="md-genre-select-wrapper md-custom-select-wrapper" id="metadata-genre-wrapper">
              <div class="md-genre-select md-custom-select-trigger" id="metadata-genre-select" role="button" tabindex="0">
                <div class="md-genre-tags" id="metadata-genre-tags"></div>
                <input type="text" id="metadata-genre-search" placeholder="Genres">
                <div class="md-genre-indicator" id="metadata-genre-indicator"></div>
              </div>
              <div class="md-custom-options md-genre-options" id="metadata-genre-options" role="listbox" multiple>
                <!-- Populated by JS -->
              </div>
            </div>
          </div>

          <!-- Main Progress -->
          <div class="md-form-group md-vertical-label" id="metadata_progress_main_group" style="display: none;">
            <label id="metadata_progress_main_label">Main Progress</label>
            <div class="md-progress-inputs">
              <input type="number" name="progress_main" id="metadata_progress_main" min="0" placeholder="Current" class="md-progress-box">
              <span class="md-progress-separator">/</span>
              <input type="number" name="total_main" id="metadata_total_main" min="0" placeholder="Total" class="md-progress-box">
            </div>
          </div>

          <!-- Secondary Progress -->
          <div class="md-form-group md-vertical-label" id="metadata_progress_secondary_group" style="display: none;">
            <label id="metadata_progress_secondary_label">Secondary Progress</label>
            <div class="md-progress-inputs">
              <input type="number" name="progress_secondary" id="metadata_progress_secondary" min="0" placeholder="Current" class="md-progress-box">
              <span class="md-progress-separator">/</span>
              <input type="number" name="total_secondary" id="metadata_total_secondary" min="0" placeholder="Total" class="md-progress-box">
            </div>
          </div>

          <!-- Release Date -->
          <div class="md-form-group md-vertical-label">
            <label>Release Date</label>
            <input type="date" name="release_date" id="metadata-release-date">
          </div>

        </div>

        <!-- Hidden element to prevent JS errors (since it expects this ID) -->
        <div id="metadata-progress-row-2" style="display: none;"></div>

        <div class="md-form-group md-notes-group">
          <label>Overview</label>
          <textarea name="overview" id="metadata-overview"></textarea>
        </div>

        <button type="button" id="metadata-close-btn" class="md-btn md-close-btn">X</button>
      </div>
    </form>
  </div>
</div>

<div id="metadata-overlay" class="md-modal-overlay md-modal-hidden"></div>
